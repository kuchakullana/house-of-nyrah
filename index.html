<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Wedding Styling Services</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .canvas-site {
            width: 100%;
            max-width: 1200px; /* Limits the layout width so it looks crisp on desktop */
            height: auto;
            display: block;
        }
        .booking-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #bf9456; /* Elegant gold tone—change hex code if desired */
            color: white;
            padding: 16px 28px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: transform 0.2s;
        }
        .booking-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- Displays your full, sharp Canva design layout -->
    <img src="homepage.png" alt="Wedding Styling Portfolio and Packages" class="canvas-site">

    <!-- CRUCIAL USPTO POINT-OF-SALE REQUIREMENT -->
    <!-- Replace the href link below with your actual Calendly link or Google Form link -->

</body>
</html>
