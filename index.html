<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Nyrah | Indian Wedding Styling</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .canvas-site {
            width: 100%;
            max-width: 1200px; /* Keeps your designs crisp and centered */
            height: auto;
            display: block;
        }
        .booking-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #bf9456; /* Elegant gold accent tone */
            color: white;
            padding: 16px 28px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: transform 0.2s;
        }
        .booking-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <img src="Home page.png" alt="House of Nyrah Home" class="canvas-site">
    <img src="About Us.png" alt="About House of Nyrah" class="canvas-site">
    <img src="Services.png" alt="Wedding Styling Services" class="canvas-site">
    <img src="Featured Work.png" alt="Featured Styling Work" class="canvas-site">
    <img src="Contact Page.png" alt="Contact House of Nyrah" class="canvas-site">

    <a href="https://calendly.com/your-username" target="_blank" class="booking-btn">Book a Styling Consultation</a>

</body>
</html>
